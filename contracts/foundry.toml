[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Monad testnet (chain 10143). Verificación vía Sourcify — NO Etherscan.
[rpc_endpoints]
monad = "https://testnet-rpc.monad.xyz"

[etherscan]
# Explícitamente deshabilitado: Monad usa Sourcify, no Etherscan.

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
